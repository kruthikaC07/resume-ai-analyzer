<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#0f172a,#1e293b);
            min-height:100vh;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .container{
            width:100%;
            max-width:900px;
        }

        .title{
            text-align:center;
            margin-bottom:25px;
        }

        .title h1{
            font-size:42px;
            color:#38bdf8;
            margin-bottom:10px;
        }

        .title p{
            color:#cbd5e1;
        }

        .card{
            background:#111827;
            padding:25px;
            border-radius:18px;
            margin-bottom:20px;
            box-shadow:0 8px 25px rgba(0,0,0,0.3);
        }

        textarea{
            width:100%;
            height:220px;
            resize:none;
            border:none;
            outline:none;
            border-radius:12px;
            padding:15px;
            font-size:15px;
            margin-top:15px;
            background:#1e293b;
            color:white;
        }

        textarea::placeholder{
            color:#94a3b8;
        }

        button{
            margin-top:20px;
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#38bdf8;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
            font-weight:bold;
        }

        button:hover{
            background:#0ea5e9;
            transform:scale(1.02);
        }

        .score-box{
            text-align:center;
            margin-top:10px;
        }

        .score-circle{
            width:140px;
            height:140px;
            border-radius:50%;
            background:#38bdf8;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:20px auto;
            font-size:32px;
            font-weight:bold;
            color:#0f172a;
        }

        .feedback-title{
            margin-top:20px;
            margin-bottom:15px;
            color:#38bdf8;
        }

        ul{
            list-style:none;
        }

        li{
            background:#1e293b;
            margin-bottom:12px;
            padding:14px;
            border-radius:10px;
            color:#e2e8f0;
            line-height:1.5;
        }

        .footer{
            text-align:center;
            margin-top:20px;
            color:#94a3b8;
            font-size:14px;
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="title">
            <h1>🚀 AI Resume Analyzer</h1>
            <p>Analyze your resume with ATS-style scoring and smart AI suggestions</p>
        </div>

        <div class="card">

            <h2>Paste Your Resume</h2>

            <textarea
                id="resumeText"
                placeholder="Paste your resume text here..."
            ></textarea>

            <button onclick="analyzeResume()">
                Analyze Resume
            </button>

        </div>

        <div class="card">

            <div class="score-box">

                <h2>Your ATS Score</h2>

                <div class="score-circle" id="scoreCircle">
                    --
                </div>

            </div>

            <h2 class="feedback-title">
                AI Suggestions
            </h2>

            <ul id="feedbackList"></ul>

        </div>

        <div class="footer">
            Built using Flask + JavaScript + AI Logic
        </div>

    </div>

    <script>

        async function analyzeResume() {

            const resume =
                document.getElementById("resumeText").value;

            if(resume.trim() === ""){

                alert("Please paste your resume");

                return;
            }

            try{

                const response = await fetch(
                    "http://127.0.0.1:5000/analyze-text",
                    {
                        method:"POST",

                        headers:{
                            "Content-Type":"application/json"
                        },

                        body:JSON.stringify({
                            resume:resume
                        })
                    }
                );

                const data = await response.json();

                console.log(data);

                // SCORE
                document.getElementById("scoreCircle")
                    .innerText = data.score;

                // FEEDBACK
                const feedbackList =
                    document.getElementById("feedbackList");

                feedbackList.innerHTML = "";

                if(
                    !data.feedback ||
                    data.feedback.length === 0
                ){

                    feedbackList.innerHTML =
                        "<li>No suggestions found</li>";

                    return;
                }

                data.feedback.forEach(item => {

                    const li =
                        document.createElement("li");

                    li.innerText = item;

                    feedbackList.appendChild(li);

                });

            }
            catch(error){

                console.error(error);

                alert("Backend connection failed");

            }
        }

    </script>

</body>
</html>
